<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Table</title>
    <style>
    table {
        border-collapse: collapse;
        margin: 50px auto;
        width: 70%;
        font-family: Arial, sans-serif;
    }
    th, td {
        border: 2px solid #000000;
        padding: 8px;
        text-align: center;
    }
    th {
        font-weight: bold;
    }

    tr:nth-child(1),
    tr:nth-child(2) {
        background-color: #326d86;
    }
</style>

</head>
<body>

<table>
    <tr>
        <th rowspan="2">Roll</th>
        <th rowspan="2">Name</th>
        <th colspan="2">Contact</th>
        <th rowspan="2">Department</th>
    </tr>
    <tr>
        <th>Email</th>
        <th>Phone</th>
    </tr>
    <tr>
        <td>101</td>
        <td>Alice</td>
        <td>alice@email.com</td>
        <td>0123456789</td>
        <td>CSE</td>
    </tr>
    <tr>
        <td>102</td>
        <td>Bob</td>
        <td>bob@email.com</td>
        <td>0987654321</td>
        <td>ECE</td>
    </tr>
    <tr>
        <td>103</td>
        <td>Charlie</td>
        <td>charlie@email.com</td>
        <td>0112233445</td>
        <td>BBA</td>
    </tr>
</table>

</body>
</html>
